name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Runtime dep needed by atem_core.commands (pyatem), plus dev tools.
          pip install pyatem
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check atem_core tests

      - name: Run tests
        run: pytest -v
